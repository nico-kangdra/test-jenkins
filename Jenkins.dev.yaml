pipeline:
  agent: any

  parameters:
    - "gitParameter(name: 'BRANCH_NAME', defaultValue: 'main', description: 'Select the branch to build from', type: 'PT_BRANCH', branchFilter: '.*[/](.*)', sortMode: 'DESCENDING_SMART')"

  environment:
    GIT_REPO: "https://github.com/nico-kangdra/test-jenkins.git"
    APP_NAME: "go-app"
    DOCKER_PREFIX: "nkangdra"
    REPORTS_DIR: "${WORKSPACE}/reports"
    NGINX_PORT: "8080"

  stages:
    - stage: "PreRequisites"
      steps:
        script: |
          checkout([$class: 'GitSCM', 
                    branches: [[name: env.BRANCH_NAME]], 
                    extensions: [[$class: 'WipeWorkspace']], 
                    userRemoteConfigs: [[url: env.GIT_REPO]],
                    quickFilterEnabled: 'true'
                  ])
          env.BRANCH_NAME = "${params.BRANCH_NAME}"
          env.FULL_IMAGE = "${DOCKER_PREFIX}/${APP_NAME}:v${BUILD_NUMBER}"
          env.GIT_COMMIT_ID = sh(script: 'git rev-parse --short=7 HEAD', returnStdout: true).trim()
          currentBuild.displayName = "#${BUILD_NUMBER} - ${env.BRANCH_NAME}"
          currentBuild.description = "COMMIT: ${env.GIT_COMMIT_ID}"
    
    - stage: "Security Scan"
      steps:
        script: |
          sh '''
            mkdir -p ${REPORTS_DIR}
            docker run --rm -v ${WORKSPACE}:/src \
                -v ${REPORTS_DIR}:/reports \
                returntocorp/semgrep semgrep scan --config=auto --html -o /reports/index.html
            
            echo "✓ Semgrep scan completed, HTML report generated!"
          '''
    
    - stage: "Serve Report with Nginx"
      steps:
        script: |
          sh '''
            echo "Starting Nginx container to serve security report..."
            
            # Stop any existing nginx container
            docker stop semgrep-nginx 2>/dev/null || true
            docker rm semgrep-nginx 2>/dev/null || true
            
            # Run nginx container
            docker run -d \
              --name semgrep-nginx \
              -p ${NGINX_PORT}:80 \
              -v ${REPORTS_DIR}:/usr/share/nginx/html:ro \
              nginx:latest
            
            sleep 2
            echo "✓ Nginx server is running!"
            echo "📊 Security report available at: http://localhost:${NGINX_PORT}"
            echo "📊 Direct JSON report: http://localhost:${NGINX_PORT}/semgrep-report.json"
            
            docker ps | grep semgrep-nginx
          '''
