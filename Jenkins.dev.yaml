pipeline:
  agent: any

  parameters:
    - "gitParameter(name: 'BRANCH_NAME', defaultValue: 'main', description: 'Select the branch to build from', type: 'PT_BRANCH', branchFilter: '.*[/](.*)', sortMode: 'DESCENDING_SMART')"

  environment:
    GIT_REPO: "https://github.com/nico-kangdra/test-jenkins.git"
    APP_NAME: "go-app"
    DOCKER_PREFIX: "nkangdra"

  stages:
    - stage: "PreRequisites"
      steps:
        script: |
          checkout([$class: 'GitSCM', 
                    branches: [[name: env.BRANCH_NAME]], 
                    extensions: [[$class: 'WipeWorkspace']], 
                    userRemoteConfigs: [[url: env.GIT_REPO]],
                    quickFilterEnabled: 'true'
                  ])
          env.BRANCH_NAME = "${params.BRANCH_NAME}"
          env.FULL_IMAGE = "${DOCKER_PREFIX}/${APP_NAME}:v${BUILD_NUMBER}"
          env.REPORTS_DIR = "${WORKSPACE}/semgrep-reports"
          env.GIT_COMMIT_ID = sh(script: 'git rev-parse --short=7 HEAD', returnStdout: true).trim()
          currentBuild.displayName = "#${BUILD_NUMBER} - ${env.BRANCH_NAME}"
          currentBuild.description = "COMMIT: ${env.GIT_COMMIT_ID}"
    
    - stage: "Security Scan"
      steps:
        script: |
          sh '''
            opengrep scan > output.txt
            echo "✓ Semgrep scan completed!"
            echo ""
            echo "=== SEMGREP REPORT ==="
            cat output.txt
          '''
