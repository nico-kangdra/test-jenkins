# Simple Pipeline Example
# Native execution on agent (no Docker)
# Usage: Stages will run directly on Jenkins agent

stages:
  - name: "Hello World"
    command: |
      echo "Hello from pipeline!"
      echo "Current date: $(date)"
      
  - name: "List Files"
    command: |
      echo "Workspace files:"
      ls -la
      
  - name: "Echo Environment"
    env:
      - "MY_VAR=Hello"
      - "BUILD_ENV=testing"
    command: |
      echo "MY_VAR = $MY_VAR"
      echo "BUILD_ENV = $BUILD_ENV"
      echo "BUILD_NUMBER = $BUILD_NUMBER"
      docker run -d debian:latest sleep infinity