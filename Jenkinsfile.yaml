pipeline:
  agent: any

  parameters:
    - "gitParameter(name: 'BRANCH_NAME', defaultValue: 'main', description: 'Select the branch to build from', type: 'PT_BRANCH', branchFilter: '.*[/](.*)', sortMode: 'DESCENDING_SMART')"

  environment:
    GIT_REPO: "https://github.com/nico-kangdra/test-jenkins.git"
    APP_NAME: "go-app"
    DOCKER_PREFIX: "nkangdra"

  stages:
    - stage: "PreRequisites"
      steps:
        script: |
          env.BRANCH_NAME = "${params.BRANCH_NAME}"
          env.FULL_IMAGE = "${DOCKER_PREFIX}/${APP_NAME}:v${BUILD_NUMBER}"
          checkout([$class: 'GitSCM', 
                    branches: [[name: env.BRANCH_NAME]], 
                    extensions: [[$class: 'WipeWorkspace']], 
                    userRemoteConfigs: [[url: env.GIT_REPO]],
                    quickFilterEnabled: 'true'
                  ])

    - stage: "Docker Build and Push"
      steps:
        script:
          - withCredentials: "[usernamePassword(credentialsId: 'docker-hub', passwordVariable: 'PASSWORD', usernameVariable: 'USERNAME')]"
            script: |
              sh '''
                echo $PASSWORD | docker login -u $USERNAME --password-stdin
                docker build -t $FULL_IMAGE .
                docker push $FULL_IMAGE
              '''

    - stage: "Docker Deploy"
      steps:
        script: |
          sh '''
            docker run -d -p 8081:8080 --name $APP_NAME $FULL_IMAGE
            echo "DONE !!!"
          '''

  post:
    always: 
      script: |
        sh '''
          sleep 10
          docker rm -f $APP_NAME
        '''